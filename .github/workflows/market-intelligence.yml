name: Market Intelligence

on:
  push:
    branches:
      - main
    paths-ignore:
      - .market_alert_state.json
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  run-market-intelligence:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ vars.TELEGRAM_CHAT_ID || '843487976' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run market intelligence
        run: python main.py

      - name: Persist alert memory
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .market_alert_state.json
          git diff --cached --quiet && exit 0
          git commit -m "Persist alert memory [skip ci]"
          git push
